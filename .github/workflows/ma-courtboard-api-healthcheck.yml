name: ma-courtboard-api healthcheck

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Probe /actuator/health
        id: probe
        run: |
          set +e
          BODY=$(curl -fsS --max-time 10 "${{ secrets.HEALTH_URL }}")
          CODE=$?

          STATUS=$(echo "$BODY" | jq -r '.status // "UNREACHABLE"')
          DB=$(echo "$BODY"     | jq -r '.components.db.status // "UNKNOWN"')
          DISK=$(echo "$BODY"   | jq -r '.components.diskSpace.status // "UNKNOWN"')

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "db=$DB"         >> "$GITHUB_OUTPUT"
          echo "disk=$DISK"     >> "$GITHUB_OUTPUT"

          if [ "$CODE" -ne 0 ] || [ "$DB" != "UP" ]; then
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check TLS certificate expiry
        id: cert
        run: |
          set +e
          HOST=courtboard.kro.kr
          PORT=443

          END_DATE=$(echo | openssl s_client -connect ${HOST}:${PORT} -servername ${HOST} 2>/dev/null \
            | openssl x509 -noout -enddate 2>/dev/null \
            | sed 's/notAfter=//')

          if [ -z "$END_DATE" ]; then
            echo "cert_end=UNKNOWN"        >> "$GITHUB_OUTPUT"
            echo "cert_days=UNKNOWN"       >> "$GITHUB_OUTPUT"
            exit 0
          fi

          END_EPOCH=$(date -d "$END_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (END_EPOCH - NOW_EPOCH) / 86400 ))

          echo "cert_end=$END_DATE"  >> "$GITHUB_OUTPUT"
          echo "cert_days=$DAYS_LEFT" >> "$GITHUB_OUTPUT"

      - name: Decide notification
        id: decide
        run: |
          NOTIFY=false
          REASON=""

          if [ "${{ steps.probe.outputs.healthy }}" != "true" ]; then
            NOTIFY=true
            REASON="db"
          fi

          CERT_DAYS='${{ steps.cert.outputs.cert_days }}'
          if [ "$CERT_DAYS" != "UNKNOWN" ] && [ -n "$CERT_DAYS" ] && [ "$CERT_DAYS" -le 7 ] 2>/dev/null; then
            NOTIFY=true
            if [ -n "$REASON" ]; then
              REASON="${REASON},cert"
            else
              REASON="cert"
            fi
          fi

          echo "notify=$NOTIFY"  >> "$GITHUB_OUTPUT"
          echo "reason=$REASON"  >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: steps.decide.outputs.notify == 'true'
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.probe.outputs.healthy }}" = "true" ]; then
            TITLE=":warning: ma-courtboard-api cert expiring soon"
            COLOR=16776960
          else
            TITLE=":rotating_light: ma-courtboard-api DOWN"
            COLOR=15158332
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --argjson color $COLOR \
            --arg s        '${{ steps.probe.outputs.status }}' \
            --arg d        '${{ steps.probe.outputs.db }}' \
            --arg disk     '${{ steps.probe.outputs.disk }}' \
            --arg url      '${{ secrets.HEALTH_URL }}' \
            --arg certEnd  '${{ steps.cert.outputs.cert_end }}' \
            --arg certDays '${{ steps.cert.outputs.cert_days }}' \
            --arg run      "$RUN_URL" \
            '{
               username: "courtboard-monitor",
               embeds: [{
                 title: $title,
                 color: $color,
                 fields: [
                   { name: "overall",    value: $s,         inline: true },
                   { name: "db",         value: $d,         inline: true },
                   { name: "disk",       value: $disk,      inline: true },
                   { name: "cert expiry",   value: $certEnd,  inline: true },
                   { name: "cert days left", value: $certDays, inline: true },
                   { name: "endpoint",   value: $url },
                   { name: "run log",    value: $run }
                 ]
               }]
             }')
          curl -fsS -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"
